<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT 2.0 - Setting Up</title>
    <style>
        :root {
            --bg-base: #0a0a0c;
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-color: #5e6ad2;
            --accent-glow: rgba(94, 106, 210, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .ambient-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(94, 106, 210, 0.4), transparent);
            top: -100px; left: -100px;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            bottom: -80px; right: -80px;
            animation-delay: -7s;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            min-width: 420px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 36px;
        }

        .status-text {
            font-size: 15px;
            margin-bottom: 20px;
            min-height: 22px;
            transition: opacity 0.3s;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #8b5cf6);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .progress-fill.indeterminate {
            width: 30%;
            animation: indeterminate 1.5s infinite ease-in-out;
        }

        @keyframes indeterminate {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(430%); }
        }

        .percent {
            font-size: 13px;
            color: var(--text-secondary);
            min-height: 18px;
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-text {
            color: #f87171;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <div class="spinner"></div>
        <div class="logo">ChatGPT <span>2.0</span></div>
        <div class="subtitle">Local AI Assistant</div>
        <div class="status-text" id="status">Initializing...</div>
        <div class="progress-track">
            <div class="progress-fill indeterminate" id="progressFill"></div>
        </div>
        <div class="percent" id="percent"></div>
        <div class="error-text" id="errorText"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const statusEl = document.getElementById('status');
        const fillEl = document.getElementById('progressFill');
        const percentEl = document.getElementById('percent');
        const errorEl = document.getElementById('errorText');

        ipcRenderer.on('setup-status', (event, { stage, progress }) => {
            fillEl.classList.remove('indeterminate');

            switch (stage) {
                case 'checking':
                    statusEl.textContent = 'Checking for Ollama...';
                    fillEl.classList.add('indeterminate');
                    percentEl.textContent = '';
                    break;
                case 'downloading':
                    statusEl.textContent = 'Downloading Ollama...';
                    fillEl.style.width = progress + '%';
                    percentEl.textContent = progress + '%';
                    break;
                case 'installing':
                    statusEl.textContent = 'Installing Ollama...';
                    fillEl.style.width = '100%';
                    percentEl.textContent = 'This may take a moment';
                    break;
                case 'starting':
                    statusEl.textContent = 'Starting Ollama...';
                    fillEl.classList.add('indeterminate');
                    percentEl.textContent = '';
                    break;
                case 'ready':
                    statusEl.textContent = 'Ready!';
                    fillEl.style.width = '100%';
                    percentEl.textContent = '';
                    break;
                case 'error':
                    statusEl.textContent = 'Setup failed';
                    errorEl.textContent = progress;
                    errorEl.style.display = 'block';
                    fillEl.style.width = '0%';
                    percentEl.textContent = '';
                    break;
            }
        });
    </script>
</body>
</html>
