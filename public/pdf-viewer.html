<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Studio</title>
  <link rel="stylesheet" href="pdf-viewer.css">
  <link rel="stylesheet" href="pdf-editor.css">
</head>
<body>

<input type="file" id="pv-file-input" accept=".pdf,.gdoc,.xlsx,.xls,.csv,.png,.jpg,.jpeg,.gif,.webp,.svg,.py,.js,.ts,.json,.md,.txt,.html,.css,.docx,.mp3,.wav,.ogg,.flac,.mp4,.webm,.mov" hidden>

<div id="pv-app">

  <!-- ════════════════════════════════════════════════════════════
       FILE TREE SIDEBAR — collapsible document browser
       ════════════════════════════════════════════════════════════ -->
  <aside id="pv-file-sidebar" class="pv-file-sidebar">
    <div class="pvfs-header">
      <span class="pvfs-title">Documents</span>
      <button id="pvfs-collapse-btn" class="pvfs-btn" title="Collapse sidebar">&#9666;</button>
    </div>
    <div class="pvfs-search-wrap">
      <input id="pvfs-search" class="pvfs-search" type="text" placeholder="Search files...">
    </div>
    <div id="pvfs-tree" class="pvfs-tree"></div>
  </aside>
  <button id="pvfs-open-btn" class="pvfs-open-btn" title="Show documents">&#9656;</button>

  <!-- ════════════════════════════════════════════════════════════
       HOME SCREEN — default, fills everything
       ════════════════════════════════════════════════════════════ -->
  <div id="pv-home" class="pv-home">

    <div class="pvh-top-row">
      <span id="pvh-greeting" class="pvh-greeting"></span>
      <label class="pvh-new-btn" for="pv-file-input">+ New File</label>
    </div>

    <!-- Create new templates -->
    <div class="pvh-section">
      <div class="pvh-section-label">CREATE NEW</div>
      <div class="pvh-templates">
        <div class="pvh-tpl" data-type="gdoc" data-template="blank">
          <span class="pvh-tpl-icon pvh-c-doc">DOC</span>
          <span class="pvh-tpl-name">Blank Document</span>
        </div>
        <div class="pvh-tpl" data-type="gdoc" data-template="report">
          <span class="pvh-tpl-icon pvh-c-doc">DOC</span>
          <span class="pvh-tpl-name">Report</span>
        </div>
        <div class="pvh-tpl" data-type="gdoc" data-template="resume">
          <span class="pvh-tpl-icon pvh-c-doc">DOC</span>
          <span class="pvh-tpl-name">Resume</span>
        </div>
        <div class="pvh-tpl" data-type="gdoc" data-template="notes">
          <span class="pvh-tpl-icon pvh-c-doc">DOC</span>
          <span class="pvh-tpl-name">Meeting Notes</span>
        </div>
        <div class="pvh-tpl" data-type="pdf">
          <span class="pvh-tpl-icon pvh-c-pdf">PDF</span>
          <span class="pvh-tpl-name">Blank PDF</span>
        </div>
        <div class="pvh-tpl" data-type="xlsx">
          <span class="pvh-tpl-icon pvh-c-xlsx">XLS</span>
          <span class="pvh-tpl-name">Spreadsheet</span>
        </div>
        <div class="pvh-tpl" data-type="py">
          <span class="pvh-tpl-icon pvh-c-code">PY</span>
          <span class="pvh-tpl-name">Code File</span>
        </div>
      </div>
    </div>

    <!-- Recent files grid -->
    <div class="pvh-section">
      <div class="pvh-section-label">RECENT FILES</div>
      <div id="pvh-recent-grid" class="pvh-recent-grid">
        <div class="pvh-empty-recent">No recent files yet — open or create one above</div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════
       EDITOR SCREEN — hidden until a file opens
       ════════════════════════════════════════════════════════════ -->
  <div id="pv-editor-screen" class="pv-editor-screen" style="display:none;">

    <!-- LEFT SIDEBAR (populated by active viewer) -->
    <aside id="pv-sidebar" class="pv-sidebar"></aside>

    <!-- CENTER VIEWER -->
    <main id="pv-viewer">

      <!-- ── Ribbon Toolbar ── -->
      <div id="pv-ribbon">
        <!-- Row 1: file info + tabs -->
        <div class="pvr-top">
          <button id="pv-back-home" class="pv-back-btn" title="Back to Home">&larr;</button>
          <span id="pv-doc-name-display" class="pv-editable-name"></span>
          <span id="pv-file-badge" class="pv-file-badge"></span>
          <span id="pv-save-status" class="pv-save-status"></span>
          <div class="pvr-top-sep"></div>
          <div class="pvr-tabs" id="pvr-tabs"></div>
          <div style="flex:1"></div>
          <select id="pv-model-select" class="pv-toolbar-model" title="Model"></select>
        </div>
        <!-- Row 2: ribbon band (populated by active viewer) -->
        <div class="pvr-band" id="pvr-band"></div>
      </div>

      <!-- Center content area (viewer mounts here) -->
      <div id="pv-center"></div>
    </main>

    <!-- RIGHT AGENT PANEL -->
    <aside id="pv-agent">
      <div id="pv-agent-header">
        <div class="pv-agent-header-left">
          <span class="pv-agent-dot"></span>
          <span id="pv-agent-title">Agent</span>
        </div>
        <button id="pv-agent-model-btn" class="pv-agent-model-btn">gemma3:latest &#9662;</button>
        <div id="pv-agent-model-dropdown" class="pv-agent-model-dropdown"></div>
      </div>
      <div class="pv-agent-divider"></div>
      <div id="pv-thread"></div>
      <div id="pv-input-wrap">
        <div id="pv-chip-row" class="pv-chip-row"></div>
        <div id="pv-pill-row"></div>
        <div id="pv-input-row">
          <textarea id="pv-input" placeholder="Ask agent or give instructions..." rows="1"></textarea>
          <button id="pv-send">&#8593;</button>
        </div>
      </div>
    </aside>
  </div>

</div>

<!-- Shell + Router (loaded upfront) -->
<script src="viewers/ViewerShell.js"></script>
<script src="viewers/ViewerRouter.js"></script>
</body>
</html>
