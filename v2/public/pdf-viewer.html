<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <link rel="stylesheet" href="pdf-viewer.css">
</head>
<body>

<div id="pv-app">

  <!-- ── LEFT SIDEBAR ── -->
  <aside id="pv-sidebar">
    <div id="pv-sidebar-header">
      <span class="pv-sidebar-title">Documents</span>
      <label class="pv-upload-btn" for="pv-file-input" title="Upload PDF">＋ Upload</label>
      <input type="file" id="pv-file-input" accept=".pdf" hidden>
    </div>
    <div id="pv-doc-list">
      <div class="pv-doc-empty">Select a directory in Settings<br>or upload a PDF above</div>
    </div>
  </aside>

  <!-- ── CENTER VIEWER ── -->
  <main id="pv-viewer">
    <div id="pv-toolbar">
      <div id="pv-zoom-group">
        <button id="pv-zoom-out" title="Zoom out">−</button>
        <span id="pv-zoom-label">150%</span>
        <button id="pv-zoom-in"  title="Zoom in">＋</button>
      </div>
      <span id="pv-page-info">—</span>
      <div id="pv-doc-name-display"></div>
      <div id="pv-mode-toggle">
        <button id="pv-btn-blocks" class="active">Block Mode</button>
        <button id="pv-btn-text">Text Mode</button>
      </div>
    </div>
    <div id="pv-pages" ondragover="event.preventDefault()" ondrop="pvHandleDrop(event)">
      <div id="pv-empty-state">
        <div class="pv-empty-icon">📄</div>
        <p>Open a document from the sidebar<br>or drag &amp; drop a PDF here</p>
      </div>
    </div>
  </main>

  <!-- ── RIGHT AGENT PANEL ── -->
  <aside id="pv-agent">
    <div id="pv-agent-header">
      <span id="pv-agent-title">Agent</span>
      <select id="pv-model-select" title="Model"></select>
    </div>
    <div id="pv-thread"></div>
    <div id="pv-input-wrap">
      <div id="pv-pill-row"></div>
      <div id="pv-input-row">
        <textarea id="pv-input" placeholder="Ask about the document…" rows="1"></textarea>
        <button id="pv-send">↑</button>
      </div>
    </div>
  </aside>

</div>

<!-- Floating action bar (appended to body on selection) -->
<!-- #pv-action-bar created dynamically -->

<script>
  const PDFJS_SRC    = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
  const PDFJS_WORKER = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
</script>
<script src="pdf-viewer.js"></script>
</body>
</html>
